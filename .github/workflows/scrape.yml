name: Actualizar precios diario

# Sin trigger automatico "schedule": HEB y Comer bloquean las IPs de
# GitHub Actions (anti-bot Incapsula/Cloudflare). La actualizacion diaria
# real corre local via Task Scheduler (scripts/actualizar_precios.ps1),
# que si tiene acceso. Este workflow queda solo para pruebas manuales
# (siempre trae Chedraui bien; HEB/Comer saldran en 0 si corre desde aqui).
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        run: python scraper/run.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Actualiza precios $(date +%Y-%m-%d)"
          git push
